---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: clearglass
  namespace: edc-v
  labels:
    app: clearglass
    platform: edcv
    type: edcv-infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: clearglass
  template:
    metadata:
      labels:
        app: clearglass
        platform: edcv
        type: edcv-infra
    spec:
      containers:
        - name: clearglass
          image: ghcr.io/eclipse-cfm/clearglass:latest@sha256:2ad3b570111def39a768f489ebeb6b83228fed3dbdf56beae72d52a2e88fe813
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: JWKS_URL
              value: http://keycloak.edc-v.svc.cluster.local:8080/realms/edcv/protocol/openid-connect/certs
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 3
      restartPolicy: Always

---
apiVersion: v1
kind: Service
metadata:
  name: clearglass
  namespace: edc-v
  labels:
    tier: infrastructure
spec:
  selector:
    app: clearglass
  ports:
    - port: 8080
      targetPort: 8080
      name: http
