## This seed job provisions 6 participant companies into the virtual connector dataspace.
## For each company it:
##   1. Creates a Keycloak client (scoped JWT token with participant_context_id claim)
##   2. Creates a ParticipantContext in IdentityHub (DID, key pair, Vault config)
##   3. Registers the participant in IssuerService
##   4. Pre-issues a AeroMembershipCredential
##
## Companies:
##   Tier 1 : company-tier1
##   Tier 2 : company1-tier2, company2-tier2
##   Tier 3 : company1-tier3, company2-tier3, company3-tier3

apiVersion: batch/v1
kind: Job
metadata:
  name: participants-seed
  namespace: edc-v
  labels:
    app: participants-seed
    platform: edcv
    type: edcv-job
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        app: participants-seed
        platform: edcv
        type: edcv-job
    spec:
      restartPolicy: OnFailure
      initContainers:
        # Wait for IdentityHub to be ready
        - name: wait-for-identityhub
          image: curlimages/curl:latest@sha256:b3f1fb2a51d923260350d21b8654bbc607164a987e2f7c84a0ac199a67df812a
          command:
            - sh
            - -c
            - |
              until curl -s -o /dev/null http://identityhub.edc-v.svc.cluster.local:7081/api/identity/v1alpha/participants; do
                echo "Waiting for IdentityHub..."
                sleep 5
              done
              echo "IdentityHub is ready!"

        # Wait for IssuerService to be ready
        - name: wait-for-issuerservice
          image: curlimages/curl:latest@sha256:b3f1fb2a51d923260350d21b8654bbc607164a987e2f7c84a0ac199a67df812a
          command:
            - sh
            - -c
            - |
              until curl -sf http://issuerservice.edc-v.svc.cluster.local:10010/api/check/readiness; do
                echo "Waiting for IssuerService..."
                sleep 5
              done
              echo ""
              echo "IssuerService is ready!"

        # Wait for the issuerservice-seed job to have completed (credential definitions must exist)
        - name: wait-for-issuerservice-seed
          image: curlimages/curl:latest@sha256:b3f1fb2a51d923260350d21b8654bbc607164a987e2f7c84a0ac199a67df812a
          env:
            - name: KC_HOST
              value: "http://keycloak.edc-v.svc.cluster.local:8080"
          command:
            - sh
            - -c
            - |
              # Get issuer token to check credential definitions exist
              until true; do
                RESP=$(curl -sf -X POST "${KC_HOST}/realms/edcv/protocol/openid-connect/token" \
                  -H "Content-Type: application/x-www-form-urlencoded" \
                  -d "grant_type=client_credentials" \
                  -d "client_id=issuer" \
                  -d "client_secret=issuer-secret" \
                  -d "scope=issuer-admin-api:write" 2>/dev/null)
                TOKEN=$(printf '%s' "$RESP" | sed -n 's/.*"access_token":"\([^"]*\)".*/\1/p')
                if [ -z "$TOKEN" ]; then
                  echo "Waiting for issuer Keycloak client to exist..."
                  sleep 5
                  continue
                fi
                STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
                  -H "Authorization: Bearer ${TOKEN}" \
                  "http://issuerservice.edc-v.svc.cluster.local:10013/api/admin/v1alpha/participants/issuer/credentialdefinitions")
                if [ "$STATUS" -eq 200 ]; then
                  echo "Credential definitions found — issuerservice-seed is complete!"
                  break
                fi
                echo "Waiting for issuerservice-seed to complete (status: $STATUS)..."
                sleep 5
              done

      containers:
        - name: seed-participants
          image: curlimages/curl:latest@sha256:b3f1fb2a51d923260350d21b8654bbc607164a987e2f7c84a0ac199a67df812a
          env:
            - name: KC_HOST
              value: "http://keycloak.edc-v.svc.cluster.local:8080"
            - name: IH_HOST
              value: "http://identityhub.edc-v.svc.cluster.local"
            - name: IS_HOST
              value: "http://issuerservice.edc-v.svc.cluster.local"
          command:
            - sh
            - -c
            - |
              set -e

              # ── Helpers ────────────────────────────────────────────────────
              do_curl() {
                RESP=$(curl -s -w "\n%{http_code}" "$@")
                RESP_STATUS=$(printf '%s\n' "$RESP" | tail -1)
                RESP_BODY=$(printf '%s\n' "$RESP" | sed '$d')
              }

              parse_token() {
                printf '%s\n' "$1" | sed -n 's/.*"access_token":"\([^"]*\)".*/\1/p'
              }

              # ── Step 0: Shared tokens ───────────────────────────────────────
              echo "================================================"
              echo "Step 0: Obtaining shared service tokens"
              echo "================================================"

              # Keycloak admin token (for creating KC clients)
              do_curl -X POST "${KC_HOST}/realms/master/protocol/openid-connect/token" \
                -H "Content-Type: application/x-www-form-urlencoded" \
                -d "grant_type=password" \
                -d "username=admin" \
                -d "password=admin" \
                -d "client_id=admin-cli"
              if [ "$RESP_STATUS" -ge 400 ]; then
                echo "ERROR: Failed to get KC admin token (HTTP $RESP_STATUS): $RESP_BODY"
                exit 1
              fi
              KC_ADMIN_TOKEN=$(parse_token "$RESP_BODY")
              echo "✓ KC admin token obtained"

              # Provisioner token (for creating ParticipantContexts)
              do_curl -X POST "${KC_HOST}/realms/edcv/protocol/openid-connect/token" \
                -H "Content-Type: application/x-www-form-urlencoded" \
                -d "grant_type=client_credentials" \
                -d "client_id=provisioner" \
                -d "client_secret=provisioner-secret" \
                -d "scope=identity-api:write issuer-admin-api:write"
              if [ "$RESP_STATUS" -ge 400 ]; then
                echo "ERROR: Failed to get provisioner token (HTTP $RESP_STATUS): $RESP_BODY"
                exit 1
              fi
              PROVISIONER_TOKEN=$(parse_token "$RESP_BODY")
              echo "✓ Provisioner token obtained"

              # Issuer token (for pre-issuing credentials)
              do_curl -X POST "${KC_HOST}/realms/edcv/protocol/openid-connect/token" \
                -H "Content-Type: application/x-www-form-urlencoded" \
                -d "grant_type=client_credentials" \
                -d "client_id=issuer" \
                -d "client_secret=issuer-secret" \
                -d "scope=issuer-admin-api:write"
              if [ "$RESP_STATUS" -ge 400 ]; then
                echo "ERROR: Failed to get issuer token (HTTP $RESP_STATUS): $RESP_BODY"
                exit 1
              fi
              ISSUER_TOKEN=$(parse_token "$RESP_BODY")
              echo "✓ Issuer token obtained"

              # ── Loop over companies ────────────────────────────────────────
              COMPANIES="company-tier1 company1-tier2 company2-tier2 company1-tier3 company2-tier3 company3-tier3"

              for COMPANY_ID in $COMPANIES; do
                echo ""
                echo "════════════════════════════════════════════════"
                echo "Provisioning: ${COMPANY_ID}"
                echo "════════════════════════════════════════════════"

                COMPANY_SECRET="${COMPANY_ID}-secret"
                COMPANY_DID="did:web:identityhub.edc-v.svc.cluster.local%3A7083:${COMPANY_ID}"

                # ── Step 1: Create Keycloak client ─────────────────────────
                echo ""
                echo "--- Step 1: Keycloak client ---"
                do_curl -X POST "${KC_HOST}/admin/realms/edcv/clients" \
                  -H "Authorization: Bearer ${KC_ADMIN_TOKEN}" \
                  -H "Content-Type: application/json" \
                  -d '{
                    "clientId": "'"${COMPANY_ID}"'",
                    "name": "'"${COMPANY_ID}"'",
                    "description": "Participant client for '"${COMPANY_ID}"'",
                    "enabled": true,
                    "secret": "'"${COMPANY_SECRET}"'",
                    "protocol": "openid-connect",
                    "publicClient": false,
                    "serviceAccountsEnabled": true,
                    "standardFlowEnabled": false,
                    "directAccessGrantsEnabled": false,
                    "fullScopeAllowed": true,
                    "protocolMappers": [
                      {
                        "name": "participantContextId",
                        "protocol": "openid-connect",
                        "protocolMapper": "oidc-hardcoded-claim-mapper",
                        "consentRequired": false,
                        "config": {
                          "claim.name": "participant_context_id",
                          "claim.value": "'"${COMPANY_ID}"'",
                          "jsonType.label": "String",
                          "access.token.claim": "true",
                          "id.token.claim": "true",
                          "userinfo.token.claim": "true"
                        }
                      },
                      {
                        "name": "role",
                        "protocol": "openid-connect",
                        "protocolMapper": "oidc-hardcoded-claim-mapper",
                        "consentRequired": false,
                        "config": {
                          "claim.name": "role",
                          "claim.value": "participant",
                          "jsonType.label": "String",
                          "access.token.claim": "true",
                          "id.token.claim": "true",
                          "userinfo.token.claim": "true"
                        }
                      }
                    ],
                    "defaultClientScopes": [
                      "management-api:read",
                      "management-api:write",
                      "identity-api:read",
                      "identity-api:write"
                    ]
                  }'
                if [ "$RESP_STATUS" -eq 409 ]; then
                  echo "⚠ KC client already exists"
                elif [ "$RESP_STATUS" -ge 400 ]; then
                  echo "ERROR: Failed to create KC client (HTTP $RESP_STATUS): $RESP_BODY"
                  exit 1
                else
                  echo "✓ KC client created"
                fi

                # ── Step 2: Create ParticipantContext in IdentityHub ───────
                echo ""
                echo "--- Step 2: IdentityHub ParticipantContext ---"
                do_curl -X POST "${IH_HOST}:7081/api/identity/v1alpha/participants" \
                  -H "Authorization: Bearer ${PROVISIONER_TOKEN}" \
                  -H "Content-Type: application/json" \
                  -d '{
                    "roles": [],
                    "serviceEndpoints": [
                      {
                        "type": "CredentialService",
                        "serviceEndpoint": "'"http://${IH_HOST#http://}:7082/api/credentials/v1alpha/participants/${COMPANY_ID}"'",
                        "id": "cs-'"${COMPANY_ID}"'"
                      }
                    ],
                    "active": true,
                    "participantContextId": "'"${COMPANY_ID}"'",
                    "did": "'"${COMPANY_DID}"'",
                    "key": {
                      "keyId": "'"${COMPANY_DID}"'#key-1",
                      "privateKeyAlias": "key-1",
                      "keyGeneratorParams": {
                        "algorithm": "EdDSA"
                      }
                    },
                    "additionalProperties": {
                      "edc.vault.hashicorp.config": {
                        "credentials": {
                          "clientId": "'"${COMPANY_ID}"'",
                          "clientSecret": "'"${COMPANY_SECRET}"'",
                          "tokenUrl": "'"${KC_HOST}"'/realms/edcv/protocol/openid-connect/token"
                        },
                        "config": {
                          "secretPath": "v1/participants",
                          "folderPath": "'"${COMPANY_ID}"'",
                          "vaultUrl": "http://vault.edc-v.svc.cluster.local:8200"
                        }
                      }
                    }
                  }'
                if [ "$RESP_STATUS" -eq 409 ]; then
                  echo "⚠ IdentityHub participant already exists"
                elif [ "$RESP_STATUS" -ge 400 ]; then
                  echo "ERROR: Failed to create IH participant (HTTP $RESP_STATUS): $RESP_BODY"
                  exit 1
                else
                  echo "✓ IdentityHub participant created"
                fi

                # ── Step 3: Register participant in IssuerService ──────────
                echo ""
                echo "--- Step 3: IssuerService participant registration ---"
                do_curl -X POST "${IS_HOST}:10015/api/identity/v1alpha/participants" \
                  -H "Authorization: Bearer ${PROVISIONER_TOKEN}" \
                  -H "Content-Type: application/json" \
                  -d '{
                    "roles": [],
                    "serviceEndpoints": [
                      {
                        "type": "CredentialService",
                        "serviceEndpoint": "'"http://identityhub.edc-v.svc.cluster.local:7082/api/credentials/v1alpha/participants/${COMPANY_ID}"'",
                        "id": "cs-'"${COMPANY_ID}"'"
                      }
                    ],
                    "active": true,
                    "participantContextId": "'"${COMPANY_ID}"'",
                    "did": "'"${COMPANY_DID}"'",
                    "key": {
                      "keyId": "'"${COMPANY_DID}"'#key-1",
                      "privateKeyAlias": "key-1",
                      "keyGeneratorParams": {
                        "algorithm": "EdDSA"
                      }
                    },
                    "additionalProperties": {
                      "edc.vault.hashicorp.config": {
                        "credentials": {
                          "clientId": "'"${COMPANY_ID}"'",
                          "clientSecret": "'"${COMPANY_SECRET}"'",
                          "tokenUrl": "'"${KC_HOST}"'/realms/edcv/protocol/openid-connect/token"
                        },
                        "config": {
                          "secretPath": "v1/participants",
                          "folderPath": "'"${COMPANY_ID}"'",
                          "vaultUrl": "http://vault.edc-v.svc.cluster.local:8200"
                        }
                      }
                    }
                  }'
                if [ "$RESP_STATUS" -eq 409 ]; then
                  echo "⚠ IssuerService participant already exists"
                elif [ "$RESP_STATUS" -ge 400 ]; then
                  echo "ERROR: Failed to register IS participant (HTTP $RESP_STATUS): $RESP_BODY"
                  exit 1
                else
                  echo "✓ IssuerService participant registered"
                fi

                echo ""
                echo "✓ ${COMPANY_ID} provisioned successfully"
              done

              echo ""
              echo "════════════════════════════════════════════════"
              echo "All 6 participants seeded successfully!"
              echo "════════════════════════════════════════════════"
